  <body style="background-color: #f4f5f8;">
    <div id="root">
      <div id="preloader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f4f5f8; z-index: 9999;">
        <div style="width: 40px; height: 40px; border: 3px solid #ff014f20; border-top-color: #ff014f; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      #root:not(:empty) > #preloader { display: none !important; }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
